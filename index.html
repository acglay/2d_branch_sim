<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Branching Sandbox v4.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; font-family: sans-serif; }
        #ver { position: absolute; top: 10px; left: 10px; color: #fff; opacity: 0.3; font-size: 10px; z-index: 5; pointer-events: none; }
        
        /* キャンバス背面、UI前面 */
        canvas { display: block; width: 100%; height: 100%; position: absolute; z-index: 1; }
        #event-layer { position: absolute; width: 100%; height: 100%; z-index: 2; top: 0; left: 0; }

        #ui, #side-ui { z-index: 1000; position: absolute; pointer-events: auto; }
        #ui { 
            bottom: 0; left: 0; width: 100%;
            background: rgba(15, 15, 15, 0.98); color: #eee; 
            padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
            border-top: 1px solid #444; backdrop-filter: blur(25px);
        }
        #side-ui {
            right: 12px; top: 35%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px;
        }
        .side-btn { 
            width: 50px; height: 50px; background: rgba(50, 50, 50, 0.95); 
            border: 2px solid #666; border-radius: 12px; color: #fff; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer;
        }
        .side-btn.active { border-color: #0af; background: #046; box-shadow: 0 0 15px rgba(0, 170, 255, 0.5); }

        .tabs { display: flex; gap: 2px; margin-bottom: 8px; background: #111; border-radius: 6px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 10px; font-size: 10px; background: transparent; border: none; color: #555; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #333; color: #0af; }
        .tab-content { display: none; grid-template-columns: 1fr 1fr; gap: 4px 12px; padding: 4px 0; max-height: 250px; overflow-y: auto; }
        .tab-content.active { display: grid; }
        
        .btns { grid-column: span 2; display: flex; gap: 8px; justify-content: center; padding-bottom: 8px; border-bottom: 1px solid #333; margin-bottom: 8px; }
        button.action { background: #333; border: 1px solid #555; border-radius: 6px; padding: 8px 12px; color: #fff; font-size: 12px; cursor: pointer; }
        .ctrl { display: grid; grid-template-columns: 50px 1fr; align-items: center; gap: 4px; }
        label { font-size: 8px; color: #777; text-align: right; font-weight: bold; }
        input[type=range] { width: 100%; height: 24px; accent-color: #0af; margin: 0; }
    </style>
</head>
<body>
<div id="ver">ver 4.0 Robust Core</div>
<canvas id="cvs"></canvas>
<div id="event-layer"></div>

<div id="side-ui">
    <button class="side-btn active" id="btn-goal" onclick="toggleGoalMode(event)">🧭</button>
    <button class="side-btn" id="btn-edit" onclick="toggleEditMode(event)">✋</button>
    <button class="side-btn" onclick="addObstacle('circle', event)">🔴</button>
    <button class="side-btn" onclick="addObstacle('rect', event)">🟦</button>
    <button class="side-btn" id="btn-del" onclick="deleteSelected(event)" style="color: #ff4444; opacity: 0.4;">🗑️</button>
</div>

<div id="ui">
    <div class="btns">
        <button class="action" onclick="cycleColor()">🎨 Color</button>
        <button class="action" onclick="gacha()">🎲 Gacha</button>
        <button class="action" onclick="savePNG()">💾 Save</button>
        <button class="action" onclick="init()">🔄 Clear</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('basic')">BASIC</button>
        <button class="tab-btn" onclick="showTab('growth')">GROWTH</button>
        <button class="tab-btn" onclick="showTab('curve')">CURVE</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="ctrl"><label>SPD</label><input type="range" id="speed" min="0" max="10" step="0.1" value="10"></div>
        <div class="ctrl"><label>TRIM</label><input type="range" id="trim" min="0" max="15" step="0.01" value="15"></div>
        <div class="ctrl"><label>THICK</label><input type="range" id="thick" min="1" max="60" value="20"></div>
        <div class="ctrl"><label>WIND</label><input type="range" id="wind" min="-1.5" max="1.5" step="0.01" value="0"></div>
        <div class="ctrl"><label>GRAV</label><input type="range" id="grav" min="-1.5" max="1.5" step="0.01" value="0.3"></div>
        <div class="ctrl"><label>DENSITY</label><input type="range" id="crowd" min="10" max="600" value="250" oninput="init()"></div>
        <div class="ctrl"><label>GROW_S</label><input type="range" id="mGrowS" min="0" max="1" step="0.01" value="0.3" oninput="sync('gs')"></div>
        <div class="ctrl"><label>CURVE_S</label><input type="range" id="mCurveS" min="0" max="1" step="0.01" value="0.4" oninput="sync('cs')"></div>
    </div>

    <div id="growth" class="tab-content">
        <div class="ctrl"><label>LEN_B</label><input type="range" id="lenB" min="5" max="150" value="45" oninput="init()"></div>
        <div class="ctrl"><label>LEN_V</label><input type="range" id="lenV" min="0" max="100" value="20" oninput="init()"></div>
        <div class="ctrl"><label>GEN_B</label><input type="range" id="genB" min="4" max="15" step="0.1" value="8" oninput="init()"></div>
        <div class="ctrl"><label>DTH_B</label><input type="range" id="deathB" min="0" max="0.5" step="0.01" value="0.05" oninput="init()"></div>
    </div>

    <div id="curve" class="tab-content">
        <div class="ctrl"><label>ANG_B</label><input type="range" id="angleB" min="0.1" max="2.5" step="0.1" value="0.8" oninput="init()"></div>
        <div class="ctrl"><label>AVD_B</label><input type="range" id="avoidB" min="0" max="150" value="40" oninput="init()"></div>
    </div>
</div>

<script>
let canvas, ctx, width, height, dpr, branches = [], grid = {}, hue = -1, obstacles = [];
let isEditMode = false, isSwipeGoal = true, selectedObs = null, dragOffset = null, launchStart = null;
let lastPinchDist = 0, colorIdx = 0;
const colors = [-1, 140, 200, 280, 45, 10, 180, 310];

// 物理的な押し出し
function resolveCol(x, y, radius = 0) {
    let nx = x, ny = y;
    for (let o of obstacles) {
        let dx = nx - o.x, dy = ny - o.y;
        if (o.type === 'circle') {
            const d = Math.hypot(dx, dy);
            if (d < o.size + radius) {
                const a = Math.atan2(dy, dx);
                nx = o.x + Math.cos(a) * (o.size + radius + 0.2); ny = o.y + Math.sin(a) * (o.size + radius + 0.2);
            }
        } else {
            const h = o.size + radius;
            if (Math.abs(dx) < h && Math.abs(dy) < h) {
                if (Math.abs(dx) > Math.abs(dy)) nx = o.x + (dx > 0 ? h + 0.2 : -h - 0.2);
                else ny = o.y + (dy > 0 ? h + 0.2 : -h - 0.2);
            }
        }
    }
    return { x: nx, y: ny };
}

class Branch {
    constructor(x, y, angle, gen, parent = null, initialSpeed = 2.2, initialGoal = null) {
        const res = resolveCol(x, y);
        this.startX = res.x; this.startY = res.y; this.startAngle = angle;
        this.gen = gen; this.parent = parent; this.active = true; this.age = 0;
        this.currX = res.x; this.currY = res.y; this.currAngle = angle;
        this.dna = []; this.speed = initialSpeed;
        this.initialGoal = initialGoal !== null ? initialGoal : angle;
        this.maxL = Math.max(1, parseFloat(document.getElementById('lenB').value) + (Math.random()-0.5)*2 * parseFloat(document.getElementById('lenV').value));
    }

    update() {
        if (!this.active) return;
        const goal = isSwipeGoal ? this.initialGoal : -Math.PI/2;
        const crowd = parseFloat(document.getElementById('crowd').value);
        const avdB = parseFloat(document.getElementById('avoidB').value);

        let ox = 0, oy = 0;
        for (let o of obstacles) {
            let dx = this.currX - o.x, dy = this.currY - o.y;
            let d = (o.type === 'circle') ? Math.hypot(dx, dy) : Math.max(Math.abs(dx), Math.abs(dy));
            if (d < o.size + 20) {
                const push = (1 - d / (o.size + 20)) * 12.0;
                if (o.type === 'circle') { ox += (dx/d)*push; oy += (dy/d)*push; }
                else { if (Math.abs(dx) > Math.abs(dy)) ox += (dx>0?push:-push); else oy += (dy>0?push:-push); }
            }
        }

        let ax = 0, ay = 0, dens = 0;
        const gx = Math.floor(this.currX / 60), gy = Math.floor(this.currY / 60);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
            const cell = grid[`${gx+i},${gy+j}`];
            if (cell) {
                dens += cell.length;
                for(let p of cell) {
                    let d2 = (this.currX-p.x)**2 + (this.currY-p.y)**2;
                    if (d2 < avdB**2 && d2 > 0.5) { let d = Math.sqrt(d2); ax += (this.currX-p.x)/d; ay += (this.currY-p.y)/d; }
                }
            }
        }

        if (this.gen >= 2 && dens > crowd) { this.active = false; return; }

        let vx = Math.cos(this.currAngle) * this.speed + ax * 0.1 + ox + Math.cos(goal) * 0.45;
        let vy = Math.sin(this.currAngle) * this.speed + ay * 0.1 + oy + Math.sin(goal) * 0.45 + 0.02;
        let nA = Math.atan2(vy, vx);
        this.dna.push(nA - this.currAngle);
        this.currX += Math.cos(nA) * this.speed;
        this.currY += Math.sin(nA) * this.speed;
        const res = resolveCol(this.currX, this.currY);
        this.currX = res.x; this.currY = res.y; this.currAngle = nA;

        if (this.age % 5 === 0) {
            const k = `${gx},${gy}`;
            if (!grid[k]) grid[k] = [];
            grid[k].push({x: this.currX, y: this.currY});
        }
        if (++this.age >= this.maxL) {
            this.active = false;
            if (this.gen < parseFloat(document.getElementById('genB').value) && this.gen < 14) this.split();
        }
    }

    split() {
        const aB = parseFloat(document.getElementById('angleB').value);
        const num = (this.gen < 2) ? 2 : (Math.random() > 0.9 ? 3 : 2);
        for (let i = 0; i < num; i++) {
            const a = this.currAngle + (i - (num-1)/2) * aB + (Math.random()-0.5) * 0.3;
            branches.push(new Branch(this.currX, this.currY, a, this.gen + 1, this, this.speed * 0.96, this.initialGoal));
        }
    }

    draw() {
        if (this.parent) { 
            const pr = resolveCol(this.parent.lastDX, this.parent.lastDY);
            this.startX = pr.x; this.startY = pr.y; this.startAngle = this.parent.lastDA; 
        }
        const vis = Math.max(0, Math.min(1, parseFloat(document.getElementById('trim').value) - this.gen));
        if (vis <= 0) { this.lastDX = this.startX; this.lastDY = this.startY; this.lastDA = this.startAngle; return; }

        const steps = Math.floor(this.dna.length * vis);
        const thickBase = parseFloat(document.getElementById('thick').value);
        const wind = parseFloat(document.getElementById('wind').value);
        const grav = parseFloat(document.getElementById('grav').value);
        
        let dX = this.startX, dY = this.startY, dA = this.startAngle;
        let cDX = 0, cDY = 0;

        for (let c = 0; c < 10; c++) {
            const si = c * Math.ceil(steps/10), ei = Math.min(steps, (c+1)*Math.ceil(steps/10));
            if (si >= steps) break;

            const progress = (this.gen + (si / this.maxL));
            const size = Math.max(0.1, thickBase * Math.pow(0.68, progress));
            const brightness = size > thickBase * 0.3 ? 1.0 : Math.min(1.0, size / (thickBase*0.3) + 0.1);
            
            ctx.beginPath(); ctx.lineWidth = size; ctx.lineCap = 'round';
            if (hue === -1) { const v = Math.floor(255 * brightness); ctx.strokeStyle = `rgb(${v},${v},${v})`; }
            else { ctx.strokeStyle = `hsl(${hue}, 80%, ${Math.min(100, (40+this.gen*4)*brightness)}%)`; }

            ctx.moveTo(dX + cDX, dY + cDY);
            for (let i = si; i < ei; i++) {
                dA += this.dna[i];
                const stiff = Math.max(0.01, size / thickBase);
                cDX += wind / (stiff * 20); cDY += grav / (stiff * 20);
                dX += Math.cos(dA) * this.speed; dY += Math.sin(dA) * this.speed;
                const r = resolveCol(dX + cDX, dY + cDY);
                ctx.lineTo(r.x, r.y);
                if (i === ei - 1) { this.lastDX = r.x; this.lastDY = r.y; }
            }
            ctx.stroke();
        }
        this.lastDA = dA;
    }
}

function init() {
    canvas = document.getElementById('cvs'); ctx = canvas.getContext('2d');
    dpr = window.devicePixelRatio || 1;
    width = canvas.width = window.innerWidth * dpr; height = canvas.height = window.innerHeight * dpr;
    ctx.resetTransform(); ctx.scale(dpr, dpr);
    branches = []; grid = {};
    branches.push(new Branch(window.innerWidth/2, window.innerHeight - 150, -Math.PI/2, 0, null, 2.5, -Math.PI/2));
}

function loop() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    for (let o of obstacles) {
        ctx.fillStyle = (o === selectedObs) ? 'rgba(0, 150, 255, 0.4)' : 'rgba(100, 100, 100, 0.15)';
        ctx.strokeStyle = (o === selectedObs) ? '#0af' : 'rgba(255,255,255,0.15)';
        ctx.lineWidth = (o === selectedObs) ? 3 : 1; ctx.beginPath();
        if (o.type === 'circle') ctx.arc(o.x, o.y, o.size, 0, Math.PI*2);
        else ctx.rect(o.x - o.size, o.y - o.size, o.size*2, o.size*2);
        ctx.fill(); ctx.stroke();
    }
    const it = Math.floor(parseFloat(document.getElementById('speed').value));
    for (let i = 0; i < it; i++) for (let b of branches) if (b.active) b.update();
    for (let b of branches) b.draw();
    if (launchStart && !isEditMode) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(launchStart.x, launchStart.y); ctx.lineTo(launchStart.cx, launchStart.cy); ctx.stroke();
    }
    requestAnimationFrame(loop);
}

// UI Controller
function showTab(id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === id));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === id));
}
function toggleGoalMode(e) { e.stopPropagation(); isSwipeGoal = !isSwipeGoal; document.getElementById('btn-goal').classList.toggle('active', isSwipeGoal); }
function toggleEditMode(e) { e.stopPropagation(); isEditMode = !isEditMode; document.getElementById('btn-edit').classList.toggle('active', isEditMode); if(!isEditMode) selectedObs = null; }
function addObstacle(type, e) { e.stopPropagation(); obstacles.push({ type, x: window.innerWidth/2, y: window.innerHeight/3, size: 70 }); selectedObs = obstacles[obstacles.length-1]; if(!isEditMode) toggleEditMode(e); document.getElementById('btn-del').style.opacity = 1; }
function deleteSelected(e) { e.stopPropagation(); if (selectedObs) { obstacles = obstacles.filter(o => o !== selectedObs); selectedObs = null; document.getElementById('btn-del').style.opacity = 0.4; } }
function sync(m) { const v = parseFloat(document.getElementById(m==='gs'?'mGrowS':'mCurveS').value); if(m==='gs'){ document.getElementById('lenB').value=v*150; document.getElementById('genB').value=4+v*11; } else { document.getElementById('angleB').value=0.1+v*2.4; document.getElementById('avoidB').value=v*150; } init(); }
function gacha() { document.querySelectorAll('#ui input').forEach(i => { if(!['speed','trim','thick','crowd','wind','grav'].includes(i.id)) i.value = (Math.random()*(parseFloat(i.max)-parseFloat(i.min)))+parseFloat(i.min); }); init(); }
function cycleColor() { hue = colors[++colorIdx % colors.length]; }
function savePNG() { const link = document.createElement('a'); link.download = 'sandbox.png'; link.href = canvas.toDataURL(); link.click(); }

// Event Layer Logic
window.addEventListener('load', () => {
    init(); loop();
    const el = document.getElementById('event-layer');
    const getP = (e) => { const t = (e.touches && e.touches.length > 0) ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; };
    
    el.addEventListener('pointerdown', (e) => {
        const p = getP(e);
        if (isEditMode) {
            selectedObs = obstacles.slice().reverse().find(o => Math.hypot(o.x - p.x, o.y - p.y) < o.size + 30);
            if (selectedObs) dragOffset = { x: p.x - selectedObs.x, y: p.y - selectedObs.y };
            document.getElementById('btn-del').style.opacity = selectedObs ? 1 : 0.4;
        } else {
            launchStart = { x: p.x, y: p.y, cx: p.x, cy: p.y };
        }
    });

    el.addEventListener('pointermove', (e) => {
        const p = getP(e);
        if (isEditMode && selectedObs && dragOffset) {
            selectedObs.x = p.x - dragOffset.x; selectedObs.y = p.y - dragOffset.y;
        } else if (launchStart) {
            launchStart.cx = p.x; launchStart.cy = p.y;
        }
    });

    el.addEventListener('pointerup', () => {
        if (launchStart && !isEditMode) {
            const dx = launchStart.cx - launchStart.x, dy = launchStart.cy - launchStart.y;
            if (Math.hypot(dx, dy) > 15) { const a = Math.atan2(dy, dx); branches.push(new Branch(launchStart.x, launchStart.y, a, 0, null, Math.min(6, Math.hypot(dx,dy)/20), a)); }
        }
        launchStart = null; dragOffset = null;
    });
});
</script>
</body>
</html>
