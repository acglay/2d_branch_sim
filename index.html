<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2D Branching Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: auto; }
        .row { margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
        input[type=range] { width: 100px; margin-left: 10px; }
    </style>
</head>
<body>
<div id="ui">
    <div class="row">Speed <input type="range" id="speed" min="1" max="20" value="5"></div>
    <div class="row">Hue <input type="range" id="hue" min="0" max="360" value="140"></div>
    <div class="row">Gravity <input type="range" id="gravity" min="-0.5" max="0.5" step="0.01" value="0.05"></div>
    <div class="row">Avoidance <input type="range" id="avoid" min="0" max="50" value="20"></div>
    <div class="row">Smoothness <input type="range" id="smooth" min="0" max="1" step="1" value="1"></div>
    <div style="font-size: 10px; opacity: 0.7;">Swipe Up: Grow / Down: Inhibitor</div>
</div>
<canvas id="cvs"></canvas>

<script>
const canvas = document.getElementById('cvs');
const ctx = canvas.getContext('2d');
const ui = {
    speed: document.getElementById('speed'),
    hue: document.getElementById('hue'),
    gravity: document.getElementById('gravity'),
    avoid: document.getElementById('avoid'),
    smooth: document.getElementById('smooth')
};

let width, height;
let branches = [];
let points = []; 
let swipeEffect = 0;

class Branch {
    constructor(x, y, vx, vy, gen) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.gen = gen;
        this.age = 0;
        this.active = true;
        this.history = [{x, y}];
        this.maxLength = 15 + Math.random() * 20;
    }

    update() {
        if (!this.active) return;

        let avX = 0;
        let avY = 0;
        const avoidDist = parseFloat(ui.avoid.value);
        
        for (let p of points) {
            let dx = this.x - p.x;
            let dy = this.y - p.y;
            let d2 = dx*dx + dy*dy;
            if (d2 < avoidDist * avoidDist && d2 > 0) {
                let d = Math.sqrt(d2);
                avX += dx / d;
                avY += dy / d;
            }
        }

        this.vx += avX * 0.1;
        this.vy += avY * 0.1 + parseFloat(ui.gravity.value);
        
        // Swipe Influence
        this.vy -= swipeEffect * 0.2;

        const mag = Math.sqrt(this.vx**2 + this.vy**2);
        this.vx = (this.vx / mag) * 2;
        this.vy = (this.vy / mag) * 2;

        this.x += this.vx;
        this.y += this.vy;
        this.history.push({x: this.x, y: this.y});
        points.push({x: this.x, y: this.y});

        this.age++;
        
        if (this.age > this.maxLength) {
            this.active = false;
            if (this.gen < 8 && Math.random() > 0.2 + (swipeEffect < 0 ? 0.5 : 0)) {
                this.branchOut();
            }
        }
    }

    branchOut() {
        const num = Math.random() > 0.8 ? 3 : 2;
        for (let i = 0; i < num; i++) {
            const ang = (Math.random() - 0.5) * 1.5;
            const nx = this.vx * Math.cos(ang) - this.vy * Math.sin(ang);
            const ny = this.vx * Math.sin(ang) + this.vy * Math.cos(ang);
            branches.push(new Branch(this.x, this.y, nx, ny, this.gen + 1));
        }
    }

    draw() {
        ctx.beginPath();
        ctx.lineWidth = Math.max(0.5, (10 - this.gen) * 0.5);
        ctx.strokeStyle = `hsla(${ui.hue.value}, 70%, ${50 + this.gen * 5}%, ${0.8 - this.gen * 0.05})`;
        
        if (ui.smooth.value == "1" && this.history.length > 2) {
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for (let i = 1; i < this.history.length - 2; i++) {
                const xc = (this.history[i].x + this.history[i + 1].x) / 2;
                const yc = (this.history[i].y + this.history[i + 1].y) / 2;
                ctx.quadraticCurveTo(this.history[i].x, this.history[i].y, xc, yc);
            }
        } else {
            ctx.moveTo(this.history[0].x, this.history[0].y);
            for (let p of this.history) ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
    }
}

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    branches = [new Branch(width / 2, height, 0, -2, 0)];
    points = [];
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
}

function loop() {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, width, height);

    const iters = parseInt(ui.speed.value);
    for (let i = 0; i < iters; i++) {
        for (let b of branches) b.update();
    }

    for (let b of branches) b.draw();
    
    swipeEffect *= 0.95; 
    requestAnimationFrame(loop);
}

let touchY = 0;
window.addEventListener('mousedown', e => touchY = e.clientY);
window.addEventListener('mousemove', e => {
    if (e.buttons > 0) {
        swipeEffect = (touchY - e.clientY) * 0.1;
        touchY = e.clientY;
    }
});
window.addEventListener('touchstart', e => touchY = e.touches[0].clientY);
window.addEventListener('touchmove', e => {
    swipeEffect = (touchY - e.touches[0].clientY) * 0.1;
    touchY = e.touches[0].clientY;
});
window.addEventListener('dblclick', init);
window.addEventListener('resize', init);

init();
loop();
</script>
</body>
</html>
