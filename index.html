<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Branching Sandbox v3.0</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; font-family: sans-serif; }
        #ver { position: absolute; top: 10px; left: 10px; color: #fff; opacity: 0.3; font-size: 10px; z-index: 5; pointer-events: none; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { 
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.96); color: #eee; 
            padding: 4px 8px calc(8px + env(safe-area-inset-bottom));
            border-top: 1px solid #444; z-index: 10; backdrop-filter: blur(15px);
        }
        
        #side-ui {
            position: absolute; right: 10px; top: 40%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 15;
        }
        .side-btn { 
            width: 44px; height: 44px; background: rgba(40, 40, 40, 0.9); 
            border: 1px solid #666; border-radius: 10px; color: #fff; 
            display: flex; align-items: center; justify-content: center; font-size: 22px;
        }
        .side-btn.active { border-color: #0af; background: #046; box-shadow: 0 0 15px #0af; }

        .tabs { display: flex; gap: 1px; margin-bottom: 4px; background: #222; border-radius: 4px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 8px; font-size: 10px; background: transparent; border: none; color: #666; }
        .tab-btn.active { background: #333; color: #0af; font-weight: bold; }
        .tab-content { display: none; grid-template-columns: 1fr 1fr; gap: 4px 12px; padding: 4px 0; max-height: 200px; overflow-y: auto; }
        .tab-content.active { display: grid; }
        .btns { grid-column: span 2; display: flex; gap: 8px; justify-content: center; padding: 4px 0; border-bottom: 1px solid #222; margin-bottom: 4px; }
        button.action { background: #333; border: 1px solid #555; border-radius: 4px; padding: 4px 8px; color: #fff; font-size: 14px; }
        .ctrl { display: grid; grid-template-columns: 55px 1fr; align-items: center; gap: 4px; }
        label { font-size: 9px; color: #888; text-align: right; font-weight: bold; }
        input[type=range] { width: 100%; height: 20px; accent-color: #0af; margin: 0; }
    </style>
</head>
<body>
<div id="ver">ver 3.0 Solid & Steep</div>
<canvas id="cvs"></canvas>

<div id="side-ui">
    <button class="side-btn" id="btn-edit" onclick="toggleEditMode()">✋</button>
    <button class="side-btn" onclick="addObstacle('circle')">🔴</button>
    <button class="side-btn" onclick="addObstacle('rect')">🟦</button>
    <button class="side-btn" onclick="deleteSelected()">🗑️</button>
</div>

<div id="ui">
    <div class="btns">
        <button class="action" onclick="cycleColor()">🎨</button>
        <button class="action" onclick="gacha()">🎲</button>
        <button class="action" onclick="savePNG()">💾</button>
        <button class="action" onclick="init()">🔄 Clear</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('basic')">BASIC</button>
        <button class="tab-btn" onclick="showTab('growth')">GROWTH</button>
        <button class="tab-btn" onclick="showTab('curve')">CURVE</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="ctrl"><label>SPD</label><input type="range" id="speed" min="0" max="10" step="0.1" value="4"></div>
        <div class="ctrl"><label>TRIM</label><input type="range" id="trim" min="0" max="15" step="0.01" value="15"></div>
        <div class="ctrl"><label>THICK</label><input type="range" id="thick" min="1" max="25" value="8"></div>
        <div class="ctrl"><label>DENSITY</label><input type="range" id="crowd" min="10" max="400" value="200"></div>
        <div class="ctrl"><label>GROW_S</label><input type="range" id="mGrowS" min="0" max="1" step="0.01" value="0.3" oninput="sync('gs')"></div>
        <div class="ctrl"><label>CURVE_S</label><input type="range" id="mCurveS" min="0" max="1" step="0.01" value="0.4" oninput="sync('cs')"></div>
    </div>

    <div id="growth" class="tab-content">
        <div class="ctrl"><label>LEN_B</label><input type="range" id="lenB" min="5" max="100" value="30"></div>
        <div class="ctrl"><label>GEN_B</label><input type="range" id="genB" min="4" max="15" step="0.1" value="8"></div>
        <div class="ctrl"><label>DTH_B</label><input type="range" id="deathB" min="0" max="0.5" step="0.01" value="0.05"></div>
        <div class="ctrl"><label>WIND</label><input type="range" id="wind" min="-0.06" max="0.06" step="0.001" value="0"></div>
    </div>

    <div id="curve" class="tab-content">
        <div class="ctrl"><label>ANG_B</label><input type="range" id="angleB" min="0.1" max="2.5" step="0.1" value="0.8"></div>
        <div class="ctrl"><label>AVD_B</label><input type="range" id="avoidB" min="0" max="120" value="30"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d');
const ui = {}; document.querySelectorAll('input').forEach(el => ui[el.id] = el);
let width, height, dpr, branches = [], grid = {}, hue = -1, obstacles = [];
let isEditMode = false, selectedObs = null, dragOffset = null, launchStart = null;
let lastPinchDist = 0;
const cellSize = 60, colors = [-1, 140, 200, 280, 45, 10, 180, 310];

class Branch {
    constructor(x, y, angle, gen, parent = null, initialSpeed = 2.2) {
        this.startX = x; this.startY = y; this.startAngle = angle;
        this.gen = gen; this.parent = parent; this.active = true; this.age = 0;
        this.currX = x; this.currY = y; this.currAngle = angle;
        this.dna = []; this.speed = initialSpeed;
        
        const rv = () => Math.random() - 0.5;
        this.maxL = Math.max(1, parseFloat(ui.lenB.value) + rv() * 20);
        this.dProb = parseFloat(ui.deathB.value);
        this.avD = parseFloat(ui.avoidB.value);
        this.limitCrowd = parseFloat(ui.crowd.value);
        this.limitGen = parseFloat(ui.genB.value);
    }

    update() {
        if (!this.active) return;
        if (this.currX < -50 || this.currX > (width/dpr)+50 || this.currY < -50 || this.currY > (height/dpr)+50) { this.active = false; return; }

        let ox = 0, oy = 0; // 障害物回避ベクトル
        for (let obs of obstacles) {
            let dx = this.currX - obs.x;
            let dy = this.currY - obs.y;
            
            if (obs.type === 'circle') {
                const dist = Math.hypot(dx, dy);
                const margin = obs.size + 15;
                if (dist < margin) {
                    // 障害物から遠ざかる強い力（Extreme Bending）
                    const push = (1 - dist / margin) * 5.0;
                    ox += (dx / dist) * push;
                    oy += (dy / dist) * push;
                    // 内部に食い込んだ場合の押し戻し
                    if (dist < obs.size) {
                        this.currX = obs.x + (dx / dist) * (obs.size + 1);
                        this.currY = obs.y + (dy / dist) * (obs.size + 1);
                    }
                }
            } else {
                const half = obs.size;
                const adx = Math.abs(dx), ady = Math.abs(dy);
                const margin = half + 15;
                if (adx < margin && ady < margin) {
                    // 矩形の法線方向へ回避
                    const push = 5.0;
                    if (adx > ady) ox += (dx > 0 ? push : -push);
                    else oy += (dy > 0 ? push : -push);
                    // 内部に食い込んだ場合の押し戻し
                    if (adx < half && ady < half) {
                        if (adx > ady) this.currX = obs.x + (dx > 0 ? half + 1 : -half - 1);
                        else this.currY = obs.y + (dy > 0 ? half + 1 : -half - 1);
                    }
                }
            }
        }

        let ax = 0, ay = 0, density = 0;
        const gx = Math.floor(this.currX / cellSize), gy = Math.floor(this.currY / cellSize);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
            const cell = grid[`${gx+i},${gy+j}`];
            if (cell) {
                density += cell.length;
                for(let p of cell) {
                    let dx = this.currX - p.x, dy = this.currY - p.y, d2 = dx*dx + dy*dy;
                    if (d2 < this.avD*this.avD && d2 > 0.5) { let d = Math.sqrt(d2); ax += dx/d; ay += dy/d; }
                }
            }
        }

        if (this.gen >= 2 && density > this.limitCrowd) { this.active = false; return; }

        // 操舵計算: 基本ベクトル + 密集回避 + 障害物回避(強) + 風
        let vx = Math.cos(this.currAngle) * this.speed + ax * 0.15 + ox + parseFloat(ui.wind.value);
        let vy = Math.sin(this.currAngle) * this.speed + ay * 0.15 + oy + 0.02;
        
        let newAngle = Math.atan2(vy, vx);
        this.dna.push(newAngle - this.currAngle);
        this.currX += Math.cos(newAngle) * this.speed;
        this.currY += Math.sin(newAngle) * this.speed;
        this.currAngle = newAngle;

        if (this.age % 5 === 0) {
            const key = `${gx},${gy}`;
            if (!grid[key]) grid[key] = [];
            if (grid[key].length < 20) grid[key].push({x: this.currX, y: this.currY});
        }
        if (++this.age >= this.maxL) {
            this.active = false;
            if (this.gen < this.limitGen && this.gen < 14) this.split();
        }
    }

    split() {
        const bAng = parseFloat(ui.angleB.value);
        const num = (this.gen < 2) ? 2 : (Math.random() > 0.9 ? 3 : 2);
        for (let i = 0; i < num; i++) {
            const a = this.currAngle + (i - (num-1)/2) * bAng + (Math.random()-0.5) * 0.3;
            branches.push(new Branch(this.currX, this.currY, a, this.gen + 1, this, this.speed * 0.95));
        }
    }

    draw() {
        if (this.parent) { this.startX = this.parent.lastDrawX; this.startY = this.parent.lastDrawY; this.startAngle = this.parent.lastDrawAngle; }
        const visibility = Math.max(0, Math.min(1, parseFloat(ui.trim.value) - this.gen));
        if (visibility <= 0) { this.lastDrawX = this.startX; this.lastDrawY = this.startY; this.lastDrawAngle = this.startAngle; return; }

        const drawSteps = Math.floor(this.dna.length * visibility);
        const bT = parseFloat(ui.thick.value);
        let dX = this.startX, dY = this.startY, dAngle = this.startAngle;
        const chunks = 4;
        const stepsPerChunk = Math.ceil(drawSteps / chunks);

        for (let c = 0; c < chunks; c++) {
            const startStep = c * stepsPerChunk, endStep = Math.min(drawSteps, (c + 1) * stepsPerChunk);
            if (startStep >= drawSteps) break;
            const size = Math.max(0.1, bT * Math.pow(0.72, this.gen + (startStep / this.maxL)));
            const alpha = Math.min(0.8, size / 7 + 0.05);
            ctx.beginPath(); ctx.lineWidth = size; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = hue === -1 ? `rgba(255,255,255,${alpha})` : `hsla(${hue}, 80%, ${Math.min(100, 40+this.gen*4)}%, ${alpha})`;
            ctx.moveTo(dX, dY);
            for (let i = startStep; i < endStep; i++) {
                dAngle += this.dna[i];
                dX += Math.cos(dAngle) * this.speed; dY += Math.sin(dAngle) * this.speed;
                ctx.lineTo(dX, dY);
            }
            ctx.stroke();
        }
        this.lastDrawX = dX; this.lastDrawY = dY; this.lastDrawAngle = dAngle;
    }
}

function init() {
    dpr = window.devicePixelRatio || 1;
    width = canvas.width = window.innerWidth * dpr; height = canvas.height = window.innerHeight * dpr;
    ctx.resetTransform(); ctx.scale(dpr, dpr);
    branches = []; grid = {};
}

function loop() {
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    for (let obs of obstacles) {
        ctx.fillStyle = obs === selectedObs ? 'rgba(0, 170, 255, 0.4)' : 'rgba(255, 255, 255, 0.1)';
        ctx.strokeStyle = obs === selectedObs ? '#0af' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1; ctx.beginPath();
        if (obs.type === 'circle') ctx.arc(obs.x, obs.y, obs.size, 0, Math.PI*2);
        else ctx.rect(obs.x - obs.size, obs.y - obs.size, obs.size*2, obs.size*2);
        ctx.fill(); ctx.stroke();
    }
    const it = Math.floor(parseFloat(ui.speed.value));
    for (let i = 0; i < it; i++) for (let b of branches) if (b.active) b.update();
    for (let b of branches) b.draw();
    if (launchStart && !isEditMode) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(launchStart.x, launchStart.y); ctx.lineTo(launchStart.curX, launchStart.curY); ctx.stroke(); ctx.setLineDash([]);
    }
    requestAnimationFrame(loop);
}

// Interaction
const getPos = (e) => { const t = e.touches ? e.touches[0] : e; return { x: t.clientX, y: t.clientY }; };

window.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2 && isEditMode && selectedObs) {
        lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    } else {
        const pos = getPos(e);
        if (isEditMode) {
            selectedObs = obstacles.slice().reverse().find(o => Math.hypot(o.x - pos.x, o.y - pos.y) < o.size + 15);
            if (selectedObs) dragOffset = { x: pos.x - selectedObs.x, y: pos.y - selectedObs.y };
        } else {
            launchStart = { x: pos.x, y: pos.y, curX: pos.x, curY: pos.y };
        }
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2 && isEditMode && selectedObs) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        if (lastPinchDist > 0) {
            const delta = dist / lastPinchDist;
            selectedObs.size = Math.min(400, Math.max(10, selectedObs.size * delta));
        }
        lastPinchDist = dist;
    } else {
        const pos = getPos(e);
        if (isEditMode && selectedObs && dragOffset) {
            selectedObs.x = pos.x - dragOffset.x; selectedObs.y = pos.y - dragOffset.y;
        } else if (launchStart) {
            launchStart.curX = pos.x; launchStart.curY = pos.y;
        }
    }
}, { passive: false });

window.addEventListener('touchend', () => {
    if (launchStart && !isEditMode) {
        const dx = launchStart.curX - launchStart.x, dy = launchStart.curY - launchStart.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 15) branches.push(new Branch(launchStart.x, launchStart.y, Math.atan2(dy, dx), 0, null, Math.min(6, dist / 20)));
    }
    launchStart = null; dragOffset = null; lastPinchDist = 0;
});

// UI helpers
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('btn-edit').classList.toggle('active', isEditMode); if(!isEditMode) selectedObs = null; }
function addObstacle(type) { obstacles.push({ type, x: window.innerWidth/2, y: window.innerHeight/3, size: 60 }); if(!isEditMode) toggleEditMode(); selectedObs = obstacles[obstacles.length-1]; }
function deleteSelected() { if (selectedObs) { obstacles = obstacles.filter(o => o !== selectedObs); selectedObs = null; } }
function showTab(id) { document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active')); document.querySelector(`button[onclick="showTab('${id}')"]`).classList.add('active'); document.getElementById(id).classList.add('active'); }
function sync(m) { const v = parseFloat(ui[m==='gs'?'mGrowS':'mCurveS'].value); if(m==='gs'){ui.lenB.value=v*100;ui.genB.value=4+v*11;} else {ui.angleB.value=0.1+v*2.4;ui.avoidB.value=v*120;} }
function gacha() { document.querySelectorAll('#ui input[type=range]').forEach(i => { if(['thick','speed','trim'].includes(i.id)) return; i.value = (Math.random()*(i.max-i.min))+parseFloat(i.min); }); }
function cycleColor() { hue = colors[++colorIdx % colors.length]; }
let colorIdx = 0;
function savePNG() { const link = document.createElement('a'); link.download = 'sandbox.png'; link.href = canvas.toDataURL(); link.click(); }
window.onload = init; loop();
</script>
</body>
</html>
