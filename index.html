<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2D Branching Sandbox v2.2</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; font-family: sans-serif; }
        #ver { position: absolute; top: 10px; left: 10px; color: #fff; opacity: 0.3; font-size: 10px; z-index: 5; pointer-events: none; }
        #cvs-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { 
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.96); color: #eee; 
            padding: 4px 8px calc(8px + env(safe-area-inset-bottom));
            border-top: 1px solid #444; z-index: 10; backdrop-filter: blur(15px);
        }
        .tabs { display: flex; gap: 1px; margin-bottom: 4px; background: #222; border-radius: 4px; overflow: hidden; }
        .tab-btn { flex: 1; padding: 6px; font-size: 9px; background: transparent; border: none; color: #666; cursor: pointer; }
        .tab-btn.active { background: #333; color: #0af; font-weight: bold; }
        .tab-content { display: none; grid-template-columns: 1fr 1fr; gap: 2px 10px; padding: 2px 0; max-height: 180px; overflow-y: auto; }
        .tab-content.active { display: grid; }
        .btns { grid-column: span 2; display: flex; gap: 5px; justify-content: center; padding: 4px 0; border-bottom: 1px solid #222; margin-bottom: 4px; }
        button.action { background: #333; border: 1px solid #555; border-radius: 4px; width: 32px; height: 26px; font-size: 14px; color: #fff; }
        .ctrl { display: grid; grid-template-columns: 55px 1fr; align-items: center; gap: 4px; }
        label { font-size: 8px; color: #888; text-align: right; font-weight: bold; white-space: nowrap; }
        input[type=range] { width: 100%; height: 18px; accent-color: #0af; margin: 0; }
    </style>
</head>
<body>
<div id="ver">ver 2.2</div>
<div id="cvs-wrap"><canvas id="cvs"></canvas></div>
<div id="ui">
    <div class="btns">
        <button class="action" onclick="cycleColor()">🎨</button>
        <button class="action" onclick="cycleBranchPreset()">🌿</button>
        <button class="action" onclick="gacha()">🎲</button>
        <button class="action" onclick="savePNG()">💾</button>
        <button class="action" onclick="init()">🔄</button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('basic')">BASIC</button>
        <button class="tab-btn" onclick="showTab('growth')">GROWTH</button>
        <button class="tab-btn" onclick="showTab('curve')">CURVE</button>
    </div>

    <div id="basic" class="tab-content active">
        <div class="ctrl"><label>SPD</label><input type="range" id="speed" min="0" max="10" step="0.1" value="4"></div>
        <div class="ctrl"><label>TRIM</label><input type="range" id="trim" min="0" max="15" step="0.01" value="15"></div>
        <div class="ctrl"><label>THICK</label><input type="range" id="thick" min="1" max="25" value="8"></div>
        <div class="ctrl"><label>WIND</label><input type="range" id="wind" min="-0.06" max="0.06" step="0.001" value="0"></div>
        <div class="ctrl"><label>GROW_S</label><input type="range" id="mGrowS" min="0" max="1" step="0.01" value="0.3" oninput="sync('gs')"></div>
        <div class="ctrl"><label>GROW_R</label><input type="range" id="mGrowR" min="0" max="1" step="0.01" value="0.3" oninput="sync('gr')"></div>
        <div class="ctrl"><label>CURVE_S</label><input type="range" id="mCurveS" min="0" max="1" step="0.01" value="0.4" oninput="sync('cs')"></div>
        <div class="ctrl"><label>CURVE_R</label><input type="range" id="mCurveR" min="0" max="1" step="0.01" value="0.4" oninput="sync('cr')"></div>
    </div>

    <div id="growth" class="tab-content">
        <div class="ctrl"><label>LEN_B</label><input type="range" id="lenB" min="5" max="100" value="30" oninput="init()"></div>
        <div class="ctrl"><label>LEN_V</label><input type="range" id="lenV" min="0" max="100" value="20" oninput="init()"></div>
        <div class="ctrl"><label>GEN_B</label><input type="range" id="genB" min="4" max="15" step="0.1" value="8" oninput="init()"></div>
        <div class="ctrl"><label>GEN_V</label><input type="range" id="genV" min="0" max="5" step="0.1" value="1" oninput="init()"></div>
        <div class="ctrl"><label>DTH_B</label><input type="range" id="deathB" min="0" max="0.5" step="0.01" value="0.05" oninput="init()"></div>
        <div class="ctrl"><label>DTH_V</label><input type="range" id="deathV" min="0" max="0.5" step="0.01" value="0.1" oninput="init()"></div>
        <div class="ctrl"><label>GRV_B</label><input type="range" id="gravB" min="-0.3" max="0.3" step="0.01" value="0.02" oninput="init()"></div>
        <div class="ctrl"><label>GRV_V</label><input type="range" id="gravV" min="0" max="0.2" step="0.01" value="0.02" oninput="init()"></div>
    </div>

    <div id="curve" class="tab-content">
        <div class="ctrl"><label>ANG_B</label><input type="range" id="angleB" min="0.1" max="2.5" step="0.1" value="0.8" oninput="init()"></div>
        <div class="ctrl"><label>ANG_V</label><input type="range" id="angleV" min="0" max="1.5" step="0.1" value="0.4" oninput="init()"></div>
        <div class="ctrl"><label>AVD_B</label><input type="range" id="avoidB" min="0" max="120" value="30" oninput="init()"></div>
        <div class="ctrl"><label>AVD_V</label><input type="range" id="avoidV" min="0" max="60" value="15" oninput="init()"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d');
const ui = {}; document.querySelectorAll('input').forEach(el => ui[el.id] = el);
let width, height, dpr, branches = [], grid = {}, swipePos = null, swipeForce = 0, hue = -1;
const cellSize = 60, colors = [-1, 140, 200, 280, 45, 10, 180, 310];

class Branch {
    constructor(x, y, angle, gen, parent = null) {
        this.startX = x; this.startY = y; this.startAngle = angle;
        this.gen = gen; this.parent = parent; this.active = true; this.age = 0;
        this.currX = x; this.currY = y; this.currAngle = angle;
        this.dna = [];
        
        const rv = () => Math.random() - 0.5;
        this.maxL = Math.max(1, parseFloat(ui.lenB.value) + rv() * 2 * parseFloat(ui.lenV.value));
        this.gEff = parseFloat(ui.gravB.value) + rv() * 2 * parseFloat(ui.gravV.value);
        this.dProb = Math.max(0, parseFloat(ui.deathB.value) + rv() * 2 * parseFloat(ui.deathV.value));
        this.avD = Math.max(0, parseFloat(ui.avoidB.value) + rv() * 2 * parseFloat(ui.avoidV.value));
        
        const limitGen = parseFloat(ui.genB.value) + rv() * 2 * parseFloat(ui.genV.value);
        if (this.gen >= Math.floor(limitGen)) {
            this.maxL *= Math.max(0.01, limitGen - Math.floor(limitGen));
            if (this.maxL < 0.5) this.active = false;
        }
    }

    update() {
        if (!this.active) return;
        let ax = 0, ay = 0;
        const gx = Math.floor(this.currX / cellSize), gy = Math.floor(this.currY / cellSize);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
            const cell = grid[`${gx+i},${gy+j}`];
            if (cell) for(let p of cell) {
                let dx = this.currX - p.x, dy = this.currY - p.y, d2 = dx*dx + dy*dy;
                if (d2 < this.avD*this.avD && d2 > 0.5) {
                    let d = Math.sqrt(d2); ax += dx/d; ay += dy/d;
                }
            }
        }
        const globalWind = parseFloat(ui.wind.value);
        const sf = swipeForce;
        const finalGrav = this.gEff * (sf > 0 ? 0.2 : (sf < 0 ? 3.5 : 1));

        let vx = Math.cos(this.currAngle) * 2.2 + ax * 0.15 + globalWind;
        let vy = Math.sin(this.currAngle) * 2.2 + ay * 0.15 + finalGrav;
        if (swipePos) {
            let dx = this.currX - swipePos.x, dy = this.currY - swipePos.y, sd2 = dx*dx + dy*dy;
            if (sd2 < 18000) vy -= sf * (1 - Math.sqrt(sd2)/135) * 1.3;
        }
        let newAngle = Math.atan2(vy, vx);
        if (!isFinite(newAngle)) { this.active = false; return; }

        this.dna.push(newAngle - this.currAngle);
        this.currX += Math.cos(newAngle) * 2.2;
        this.currY += Math.sin(newAngle) * 2.2;
        this.currAngle = newAngle;

        if (this.age % 5 === 0) {
            const key = `${gx},${gy}`;
            if (!grid[key]) grid[key] = [];
            if (grid[key].length < 10) grid[key].push({x: this.currX, y: this.currY});
        }
        if (++this.age >= this.maxL) {
            this.active = false;
            if (this.gen < 15 && branches.length < 1800) {
                let prob = this.dProb * (sf > 0 ? 0.1 : (sf < 0 ? 6 : 1));
                if (this.gen < 3 || Math.random() > prob) this.split();
            }
        }
    }

    split() {
        const bAng = parseFloat(ui.angleB.value) + (Math.random()-0.5) * 2 * parseFloat(ui.angleV.value);
        const num = (this.gen < 3) ? 2 : (Math.random() > 0.88 ? 3 : 2);
        for (let i = 0; i < num; i++) {
            const a = this.currAngle + (i - (num-1)/2) * bAng + (Math.random()-0.5) * 0.4;
            branches.push(new Branch(this.currX, this.currY, a, this.gen + 1, this));
        }
    }

    evaluateAndDraw() {
        if (this.parent) {
            this.startX = this.parent.lastDrawX;
            this.startY = this.parent.lastDrawY;
            this.startAngle = this.parent.lastDrawAngle;
        }

        const globalTrim = parseFloat(ui.trim.value);
        let visibility = Math.max(0, Math.min(1, globalTrim - this.gen));
        
        if (visibility <= 0) {
            this.lastDrawX = this.startX;
            this.lastDrawY = this.startY;
            this.lastDrawAngle = this.startAngle;
            return;
        }

        const stepLen = 2.2; // Decayなしの固定ステップ
        const drawSteps = Math.floor(this.dna.length * visibility);

        let dX = this.startX, dY = this.startY, dAngle = this.startAngle;
        const bT = parseFloat(ui.thick.value);
        const sz = Math.max(0.2, bT * Math.pow(0.74, this.gen + (drawSteps / this.maxL)));
        const al = Math.min(0.8, Math.max(0.04, sz / 7 + 0.04));

        ctx.beginPath();
        ctx.lineWidth = sz;
        ctx.strokeStyle = hue === -1 ? `rgba(255,255,255,${al})` : `hsla(${hue}, 80%, ${Math.min(100, 40 + this.gen * 4)}%, ${al})`;
        ctx.moveTo(dX, dY);

        for (let i = 0; i < drawSteps; i++) {
            dAngle += this.dna[i];
            dX += Math.cos(dAngle) * stepLen;
            dY += Math.sin(dAngle) * stepLen;
            if (i % 3 === 0 || i === drawSteps - 1) ctx.lineTo(dX, dY);
        }
        ctx.stroke();

        this.lastDrawX = dX;
        this.lastDrawY = dY;
        this.lastDrawAngle = dAngle;
    }
}

function init() {
    dpr = window.devicePixelRatio || 1;
    width = canvas.width = window.innerWidth * dpr; height = canvas.height = window.innerHeight * dpr;
    ctx.resetTransform(); ctx.scale(dpr, dpr); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    const uiH = document.getElementById('ui').offsetHeight;
    branches = [new Branch(window.innerWidth/2, window.innerHeight - uiH - 30, -Math.PI/2, 0)];
    grid = {}; ctx.fillStyle = '#000'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    ui.trim.value = 15;
}

function loop() {
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    const it = Math.floor(parseFloat(ui.speed.value));
    for (let i = 0; i < it; i++) {
        for (let j = 0; j < branches.length; j++) if (branches[j].active) branches[j].update();
    }
    for (let b of branches) b.evaluateAndDraw();
    
    if (swipePos && Math.abs(swipeForce) > 0.05) {
        const g = ctx.createRadialGradient(swipePos.x, swipePos.y, 0, swipePos.x, swipePos.y, 90);
        g.addColorStop(0, `rgba(255,255,255,${Math.min(0.2, Math.abs(swipeForce)*0.12)})`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(swipePos.x, swipePos.y, 90, 0, Math.PI*2); ctx.fill();
    }
    swipeForce *= 0.88; if (Math.abs(swipeForce) < 0.02) { swipePos = null; swipeForce = 0; }
    requestAnimationFrame(loop);
}

function showTab(id) {
    document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
    document.querySelector(`button[onclick="showTab('${id}')"]`).classList.add('active');
    document.getElementById(id).classList.add('active');
}
function sync(m) {
    const v = parseFloat(ui[m === 'gs' ? 'mGrowS' : m === 'gr' ? 'mGrowR' : m === 'cs' ? 'mCurveS' : 'mCurveR'].value);
    if(m === 'gs') { ui.lenB.value = v * 100; ui.genB.value = 4 + v * 11; ui.deathB.value = v * 0.2; }
    if(m === 'gr') { ui.lenV.value = v * 50; ui.genV.value = v * 3; ui.deathV.value = v * 0.4; ui.gravV.value = v * 0.15; }
    if(m === 'cs') { ui.angleB.value = 0.1 + v * 2.4; ui.avoidB.value = v * 120; }
    if(m === 'cr') { ui.angleV.value = v * 1.5; ui.avoidV.value = v * 60; }
    init();
}
function gacha() {
    const curT = ui.thick.value;
    document.querySelectorAll('#ui input[type=range]').forEach(i => {
        if(['thick','speed','trim'].includes(i.id)) return;
        i.value = (Math.random() * (i.max - i.min)) + parseFloat(i.min);
    });
    ui.thick.value = curT; init();
}
function cycleColor() { hue = colors[++colorIdx % colors.length]; }
let colorIdx = 0, bPIdx = 0;
function cycleBranchPreset() {
    ui.mGrowS.value = Math.random(); ui.mGrowR.value = Math.random();
    ui.mCurveS.value = Math.random(); ui.mCurveR.value = Math.random();
    ['gs','gr','cs','cr'].forEach(sync);
}
function savePNG() {
    const link = document.createElement('a'); link.download = 'branch_v2_2.png';
    link.href = canvas.toDataURL('image/png'); link.click();
}
const hM = (x, y, dy) => { swipePos = { x, y }; swipeForce = dy * 0.6; };
let lY = 0;
window.addEventListener('touchstart', e => lY = e.touches[0].clientY, { passive: false });
window.addEventListener('touchmove', e => {
    const y = e.touches[0].clientY; hM(e.touches[0].clientX, y, lY - y); lY = y;
}, { passive: false });
window.addEventListener('mousedown', e => lY = e.clientY);
window.addEventListener('mousemove', e => { if (e.buttons > 0) { hM(e.clientX, e.clientY, lY - e.clientY); lY = e.clientY; } });
window.addEventListener('resize', () => setTimeout(init, 200));
window.onload = init; loop();
</script>
</body>
</html>
